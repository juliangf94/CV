<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julian Gonzalez Fernandez - Développeur Fullstack</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons (local para PDF) -->
    <link rel="stylesheet" href="fonts/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="cv-page">

    <!-- HEADER -->
    <header class="cv-header">
        <div class="container">
            <div class="row align-items-start">

                <!-- Photo -->
                <div class="col-lg-3 col-md-4 text-center mb-2 mb-md-0">
                    <img id="cv-photo" src="" alt="Julian Gonzalez Fernandez" class="profile-img shadow-sm">
                </div>

                <!-- Info -->
                <div class="col-lg-6 col-md-5">
                    <h1 id="cv-name" class="name-title display-5"></h1>
                    <h2 id="cv-title" class="h5 text-secondary mb-3"></h2>
                    <span id="cv-seeking" class="badge bg-primary fs-6 mb-3 px-3 py-2 rounded-pill role-badge"></span>
                    <p id="cv-bio" class="bio-text text-muted mb-0 d-none d-md-block"></p>
                </div>

                <!-- QR + Contacts -->
                <div class="col-lg-3 col-md-3 text-center mt-1 mt-md-0">
                    <p class="qr-label mb-1">julian-myportfolio.netlify.app</p>
                    <a href="#" target="_blank">
                        <img id="cv-qr" src="" alt="QR Portfolio" class="qr-code">
                    </a>
                    <div class="contact-links d-flex flex-column gap-1 text-start mt-3">
                        <span><i class="bi bi-geo-alt-fill contact-icon"></i> <span id="cv-location"></span></span>
                        <a id="cv-phone" href="#"></a>
                        <a id="cv-email" href="#"></a>
                        <a id="cv-github" href="#" target="_blank"></a>
                        <a id="cv-linkedin" href="#" target="_blank"></a>
                    </div>
                </div>

                <!-- Bio (solo visible en < md) -->
                <div class="col-12 d-md-none mt-2">
                    <p id="cv-bio-mobile" class="bio-text text-muted mb-0 text-center"></p>
                </div>

            </div>
        </div>
    </header>

    <!-- MAIN -->
    <main class="cv-main">
        <div class="container">
            <div class="row">

                <!-- SIDEBAR -->
                <aside class="col-lg-4 cv-sidebar order-2 order-lg-1">

                    <section class="cv-section">
                        <h2 class="section-title">Compétences Techniques</h2>
                        <div id="cv-skills"></div>
                    </section>

                    <section class="cv-section">
                        <h2 class="section-title">Compétences Personnelles</h2>
                        <ul id="cv-soft-skills" class="soft-skills"></ul>
                    </section>

                    <section class="cv-section">
                        <h2 class="section-title">Langues</h2>
                        <ul id="cv-languages" class="lang-list"></ul>
                    </section>

                    <section class="cv-section">
                        <h2 class="section-title">Loisirs</h2>
                        <ul id="cv-hobbies" class="loisirs-list"></ul>
                    </section>

                </aside>

                <!-- CONTENT -->
                <div class="col-lg-8 cv-content order-1 order-lg-2">

                    <section class="cv-section">
                        <h2 class="section-title">Expériences Professionnelles</h2>
                        <div id="cv-experiences"></div>
                    </section>

                    <section class="cv-section">
                        <h2 class="section-title">Projets</h2>
                        <div id="cv-projects"></div>
                    </section>

                    <section class="cv-section">
                        <h2 class="section-title">Formation</h2>
                        <div id="cv-education"></div>
                    </section>

                </div>
            </div>
        </div>
    </main>

</div>

<script src="cv-data.js"></script>
<script src="cv-render.js"></script>
</body>
</html>
